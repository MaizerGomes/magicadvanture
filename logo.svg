<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#7b2cbf;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  
  <ellipse cx="256" cy="340" rx="180" ry="40" fill="url(#glow)" opacity="0.3"/>
  
  <path d="M256 80 L320 200 L200 200 Z" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <circle cx="256" cy="180" r="40" fill="url(#gold)" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="256" cy="180" r="25" fill="url(#gold)"/>
  
  <path d="M180 280 Q256 240 332 280 L300 380 Q256 420 212 380 Z" fill="#2d2d44" stroke="url(#gold)" stroke-width="4"/>
  
  <circle cx="256" cy="300" r="8" fill="#00d4ff">
    <animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <path d="M220 340 L256 320 L292 340 L256 380 Z" fill="url(#gold)" opacity="0.8"/>
  
  <text x="256" y="450" font-family="Georgia, serif" font-size="48" font-weight="bold" text-anchor="middle" fill="url(#gold)">MAGIC ADVENTURE</text>
  
  <circle cx="256" cy="180" r="60" fill="none" stroke="#00d4ff" stroke-width="2" stroke-dasharray="10 5" opacity="0.5">
    <animateTransform attributeName="transform" type="rotate" from="0 256 180" to="360 256 180" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>