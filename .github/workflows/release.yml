name: Release

on:
  push:
    tags:
      - 'v*'

env:
  MONGO_URI: ${{ secrets.MONGO_URI }}
  MONGO_DB_NAME: ${{ secrets.MONGO_DB_NAME }}

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build for macOS ARM
        run: |
          go build -ldflags="-s -w -X magicadventure/game.defaultMongoURI=$MONGO_URI -X magicadventure/game.defaultMongoDBName=$MONGO_DB_NAME" -o magicadventure-mac-arm .
          shasum -a256 magicadventure-mac-arm > checksums.txt
          chmod +x magicadventure-mac-arm

      - name: Build for macOS Intel
        run: |
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X magicadventure/game.defaultMongoURI=$MONGO_URI -X magicadventure/game.defaultMongoDBName=$MONGO_DB_NAME" -o magicadventure-mac-64 .
          shasum -a256 magicadventure-mac-64 >> checksums.txt
          chmod +x magicadventure-mac-64

      - name: Upload macOS binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            magicadventure-mac-arm
            magicadventure-mac-64
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-others:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build for Linux
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X magicadventure/game.defaultMongoURI=$MONGO_URI -X magicadventure/game.defaultMongoDBName=$MONGO_DB_NAME" -o magicadventure-linux64 .
          chmod +x magicadventure-linux64

      - name: Build for Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -X magicadventure/game.defaultMongoURI=$MONGO_URI -X magicadventure/game.defaultMongoDBName=$MONGO_DB_NAME" -o magicadventure-windows.exe .
          chmod +x magicadventure-windows.exe

      - name: Upload Linux and Windows
        uses: softprops/action-gh-release@v2
        with:
          files: |
            magicadventure-linux64
            magicadventure-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}